<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="main.css" />
    <title>Results Card</title>
  </head>
  <body>
    <div class="whole-frame">
      <div class="left-component">
        <h1>Your Result</h1>
        <div class="circle">
          <div class="client-score">76</div>
          <div class="total-score">of 100</div>
        </div>
        <h2>Great</h2>
        <p>
          You socred higher than 65% of the <br />
          people who have taken <br />
          these tests
        </p>
      </div>
      <div class="right-component">
        <h3>Summary</h3>
        <ul>
          <li>
            <img
              src="Assets/images/icon-reaction.svg"
              alt="Icon"
              class="icon"
            />
            <span class="summary-element">Reaction</span>
            <p class="summary-score">
              80<span class="light-summary-score">/100</span>
            </p>
          </li>
          <li>
            <img src="Assets/images/icon-memory.svg" alt="Icon" class="icon" />
            <span class="summary-element">Memory</span>
            <p class="summary-score">
              92<span class="light-summary-score">/100</span>
            </p>
          </li>
          <li>
            <img src="Assets/images/icon-verbal.svg" alt="Icon" class="icon" />
            <span class="summary-element">Verbal</span>
            <p class="summary-score">
              61<span class="light-summary-score">/100</span>
            </p>
          </li>
          <li>
            <img src="Assets/images/icon-visual.svg" alt="Icon" class="icon" />
            <span class="summary-element">Visual</span>
            <p class="summary-score">
              73<span class="light-summary-score">/100</span>
            </p>
          </li>
        </ul>
        <button>Continue</button>
      </div>
    </div>
  </body>
</html>
